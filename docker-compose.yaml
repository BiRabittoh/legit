services:
  legit:
    container_name: legit
    image: ghcr.io/birabittoh/legit:main
    build:
      context: .
    restart: unless-stopped
    ports:
      - "5555:5555"
    volumes:
      - /var/www/git:/var/www/git
      - ./config.yaml:/config.yaml
      - ./static:/static
      - ./templates:/templates
